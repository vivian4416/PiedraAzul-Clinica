server:
  port: 8090

spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:piedrazul;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  sql:
    init:
      mode: always

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-para-cambio-obligatorio-en-prod-2026}
    expiration-minutes: ${JWT_EXP_MIN:120}
